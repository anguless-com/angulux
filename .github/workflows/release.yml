# Release: two independent trains, one repository.
#
#   angulux        22.x  — major locked to Angular's major, tag `angulux-v*`
#   the fork family 1.x  — angulux-{styled,utils,styles,motion}, tag `angulux-forks-v*`
#
# The trains are separate because binding the forked primeuix packages to Angular's major
# would state a compatibility constraint that does not exist: they do not depend on Angular.
#
# Each train is gated on paths. semantic-release on its own would compute a bump from every
# commit since its last tag, so a `feat(table)` would bump the fork family too. The path gate
# below stops that: if no file under the train's packages changed, the train does not run.
#
# PUBLISHING: npm Trusted Publishing (OIDC). No NPM_TOKEN. See release/README.md for the
# one-time setup — and for why the FIRST publish of a package cannot use OIDC.

name: Release

on:
    workflow_dispatch:
        inputs:
            dry-run:
                description: 'Compute the release without publishing anything'
                type: boolean
                default: true
            train:
                description: 'Which train to release'
                type: choice
                options: [both, angulux, forks]
                default: both

# Releases are never concurrent. Two runs racing to move the same tags is not a situation
# worth being clever about.
concurrency:
    group: release
    cancel-in-progress: false

permissions:
    contents: read

env:
    NODE_VERSION: '22'
    # semantic-release and its plugins are run through npx rather than added to
    # devDependencies on purpose: this repository's dependency tree IS its license risk
    # surface (see SECURITY.md), and release tooling has no business inside it.
    SR_VERSION: '24'

jobs:
    # ---------------------------------------------------------------------------
    # Never release something that is not green. This repeats CI deliberately —
    # a release is exactly the moment not to trust a status check from an older commit.
    # ---------------------------------------------------------------------------
    verify:
        name: Verify
        runs-on: ubuntu-latest
        outputs:
            angulux-changed: ${{ steps.paths.outputs.angulux }}
            forks-changed: ${{ steps.paths.outputs.forks }}
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v7
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Enable corepack
              run: corepack enable

            - name: Install
              run: corepack pnpm install --frozen-lockfile

            - name: Gates (7)
              run: npm run check

            - name: Build the forked packages
              run: |
                  set -euo pipefail
                  for p in utils styled motion styles; do
                      (cd "packages/angulux-$p" && corepack pnpm run build)
                  done

            - name: Build the library
              run: corepack pnpm --filter angulux run build

            - name: Unit tests
              run: corepack pnpm --filter angulux run test:unit

            - name: Browser gate
              run: |
                  corepack pnpm --filter @angulux/verify run build
                  corepack pnpm exec playwright install --with-deps chromium
                  corepack pnpm exec playwright test --config e2e/playwright.config.ts

            # The last line of defence before an irreversible action.
            #
            # This replaced a guard that globbed `packages/angulux-*/dist/**/package.json`.
            # tsup emits no package.json into dist, so that guard read zero files and passed
            # — while three of the four forked packages were about to publish
            # `"angulux-utils": "workspace:^"` and break every consumer's install with
            # EUNSUPPORTEDPROTOCOL. A check aimed at the wrong path does not report "nothing
            # found"; it reports success.
            #
            # check-publishable packs each package and reads package.json back OUT of the
            # tarball, so it inspects the exact bytes npm would receive.
            - name: The tarballs are safe to publish
              run: npm run check:publishable

            - name: Which trains have changes
              id: paths
              run: |
                  set -euo pipefail

                  since() {
                      # Last tag of this train, or the root commit on a first release.
                      git describe --tags --match "$1" --abbrev=0 2>/dev/null \
                          || git rev-list --max-parents=0 HEAD | tail -1
                  }

                  a_base=$(since 'angulux-v*')
                  f_base=$(since 'angulux-forks-v*')

                  if [ -n "$(git diff --name-only "$a_base"..HEAD -- packages/angulux/)" ]; then
                      echo "angulux=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "angulux=false" >> "$GITHUB_OUTPUT"
                  fi

                  if [ -n "$(git diff --name-only "$f_base"..HEAD -- packages/angulux-styled/ packages/angulux-utils/ packages/angulux-styles/ packages/angulux-motion/)" ]; then
                      echo "forks=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "forks=false" >> "$GITHUB_OUTPUT"
                  fi

                  {
                      echo "### Trains with changes"
                      echo ""
                      echo "| train | base | changed |"
                      echo "|---|---|---|"
                      echo "| angulux | \`$a_base\` | $( [ -n "$(git diff --name-only "$a_base"..HEAD -- packages/angulux/)" ] && echo yes || echo no ) |"
                      echo "| forks | \`$f_base\` | $( [ -n "$(git diff --name-only "$f_base"..HEAD -- packages/angulux-styled/ packages/angulux-utils/ packages/angulux-styles/ packages/angulux-motion/)" ] && echo yes || echo no ) |"
                  } >> "$GITHUB_STEP_SUMMARY"

    # ---------------------------------------------------------------------------
    # The fork family goes first: `angulux` depends on all four, so a release that
    # bumped both trains must have the dependency published before the dependent.
    # ---------------------------------------------------------------------------
    forks:
        name: Release the fork family (1.x)
        runs-on: ubuntu-latest
        needs: verify
        if: |
            needs.verify.outputs.forks-changed == 'true' &&
            (github.event.inputs.train == 'both' || github.event.inputs.train == 'forks')
        permissions:
            contents: write
            issues: write
            pull-requests: write
            # Required for npm Trusted Publishing (OIDC) and for provenance attestations.
            id-token: write
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - uses: actions/setup-node@v7
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  registry-url: 'https://registry.npmjs.org'

            - name: Enable corepack
              run: corepack enable

            # Trusted Publishing needs npm >= 11.5.1; the npm bundled with Node 22 is older.
            - name: Update npm
              run: npm install -g npm@latest

            - name: Install
              run: corepack pnpm install --frozen-lockfile

            - name: Build
              run: |
                  set -euo pipefail
                  for p in utils styled motion styles; do
                      (cd "packages/angulux-$p" && corepack pnpm run build)
                  done

            # Computes the version, stamps it into all four package.json files (via
            # release/set-fork-versions.mjs), writes the changelog, commits, tags, and
            # creates the GitHub release. It does NOT publish — npmPublish is false and
            # the publish step below runs under OIDC.
            - name: Version before
              id: before
              run: echo "version=$(node -p "require('./packages/angulux-styled/package.json').version")" >> "$GITHUB_OUTPUT"

            - name: semantic-release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  npx --yes \
                      -p semantic-release@${SR_VERSION} \
                      -p @semantic-release/commit-analyzer \
                      -p @semantic-release/release-notes-generator \
                      -p @semantic-release/changelog \
                      -p @semantic-release/exec \
                      -p @semantic-release/git \
                      -p @semantic-release/github \
                      -p conventional-changelog-conventionalcommits@8 \
                      semantic-release --extends ./release/forks.releaserc.json \
                      ${{ github.event.inputs.dry-run == 'true' && '--dry-run' || '' }}

            - name: Did a release happen
              id: after
              if: github.event.inputs.dry-run != 'true'
              run: |
                  set -euo pipefail
                  version=$(node -p "require('./packages/angulux-styled/package.json').version")
                  echo "version=$version" >> "$GITHUB_OUTPUT"
                  if [ "$version" = "${{ steps.before.outputs.version }}" ]; then
                      echo "released=false" >> "$GITHUB_OUTPUT"
                      echo "No release warranted by the commits since the last tag. Nothing to publish."
                  else
                      echo "released=true" >> "$GITHUB_OUTPUT"
                      echo "Released ${{ steps.before.outputs.version }} → $version"
                  fi

            # All four move together on one version. A mismatch means set-fork-versions.mjs
            # did not stamp every package — publishing a partial set would leave `angulux`
            # depending on a version of a sibling that does not exist.
            - name: All four packages carry the released version
              if: steps.after.outputs.released == 'true'
              run: |
                  set -euo pipefail
                  expected="${{ steps.after.outputs.version }}"
                  bad=0
                  for p in styled utils styles motion; do
                      actual=$(node -p "require('./packages/angulux-$p/package.json').version")
                      if [ "$actual" != "$expected" ]; then
                          echo "::error::angulux-$p is at $actual, expected $expected"
                          bad=1
                      fi
                  done
                  [ "$bad" -eq 0 ] || exit 1
                  echo "all four at $expected"

            - name: Publish to npm
              if: steps.after.outputs.released == 'true'
              run: |
                  set -euo pipefail
                  version="${{ steps.after.outputs.version }}"
                  staging=$(mktemp -d)

                  for p in styled utils styles motion; do
                      dir="packages/angulux-$p"
                      name=$(node -p "require('./$dir/package.json').name")

                      # Already on the registry at a version this run just minted means the
                      # computed version is wrong, or an earlier run published without tagging.
                      # Skipping past it would hide that; publishing over it is impossible.
                      if npm view "$name@$version" version >/dev/null 2>&1; then
                          echo "::error::$name@$version is already on the registry, but this run just released it."
                          echo "Investigate the tags before doing anything else."
                          exit 1
                      fi

                      # Packed with pnpm, published with npm, and deliberately so.
                      #
                      # `pnpm pack` resolves the workspace: protocol into a real range;
                      # `npm publish <directory>` does not, which is how three of these
                      # packages nearly shipped an uninstallable dependency. npm still does
                      # the publishing, because that is what carries OIDC and --provenance.
                      # Publishing the tarball also means the artifact that ships is the same
                      # one check:publishable inspected, rather than a second build of it.
                      echo "::group::publish $name@$version"
                      (cd "$dir" && corepack pnpm pack --pack-destination "$staging" >/dev/null)
                      tarball="$staging/$name-$version.tgz"
                      [ -f "$tarball" ] || { echo "::error::expected $tarball"; ls -la "$staging"; exit 1; }

                      node -e "
                        const {execFileSync}=require('child_process');
                        const p=JSON.parse(execFileSync('tar',['xzOf','$tarball','package/package.json'],{encoding:'utf8'}));
                        for (const f of ['dependencies','peerDependencies','optionalDependencies'])
                          for (const [d,r] of Object.entries(p[f]||{}))
                            if (/^(workspace|catalog):/.test(r)) {
                              console.error('unresolved '+f+'.'+d+' = '+r); process.exit(1);
                            }
                      "

                      npm publish --provenance --access public "$tarball"
                      echo "::endgroup::"
                  done

    angulux:
        name: Release angulux (22.x)
        runs-on: ubuntu-latest
        needs: [verify, forks]
        # `always()` so this still runs when the fork train was skipped (no fork changes)
        # — but not when it actually failed.
        if: |
            always() &&
            needs.verify.result == 'success' &&
            needs.forks.result != 'failure' &&
            needs.forks.result != 'cancelled' &&
            needs.verify.outputs.angulux-changed == 'true' &&
            (github.event.inputs.train == 'both' || github.event.inputs.train == 'angulux')
        permissions:
            contents: write
            issues: write
            pull-requests: write
            id-token: write
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0
                  persist-credentials: false
                  # Pick up the commit the fork train may have just pushed.
                  ref: main

            - uses: actions/setup-node@v7
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  registry-url: 'https://registry.npmjs.org'

            - name: Enable corepack
              run: corepack enable

            - name: Update npm
              run: npm install -g npm@latest

            - name: Install
              run: corepack pnpm install --frozen-lockfile

            - name: Build
              run: |
                  set -euo pipefail
                  for p in utils styled motion styles; do
                      (cd "packages/angulux-$p" && corepack pnpm run build)
                  done
                  corepack pnpm --filter angulux run build

            # Recorded BEFORE semantic-release so the next step can tell "no release was
            # warranted" apart from "a release happened". Those two need opposite handling
            # and are indistinguishable from semantic-release's exit code alone.
            - name: Version before
              id: before
              run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

            - name: semantic-release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  npx --yes \
                      -p semantic-release@${SR_VERSION} \
                      -p @semantic-release/commit-analyzer \
                      -p @semantic-release/release-notes-generator \
                      -p @semantic-release/changelog \
                      -p @semantic-release/npm \
                      -p @semantic-release/git \
                      -p @semantic-release/github \
                      -p conventional-changelog-conventionalcommits@8 \
                      semantic-release --extends ./release/angulux.releaserc.json \
                      ${{ github.event.inputs.dry-run == 'true' && '--dry-run' || '' }}

            - name: Did a release happen
              id: after
              if: github.event.inputs.dry-run != 'true'
              run: |
                  set -euo pipefail
                  version=$(node -p "require('./package.json').version")
                  echo "version=$version" >> "$GITHUB_OUTPUT"
                  if [ "$version" = "${{ steps.before.outputs.version }}" ]; then
                      echo "released=false" >> "$GITHUB_OUTPUT"
                      echo "No release warranted by the commits since the last tag. Nothing to publish."
                  else
                      echo "released=true" >> "$GITHUB_OUTPUT"
                      echo "Released ${{ steps.before.outputs.version }} → $version"
                  fi

            # The version lives in the ROOT package.json; the build propagates it into
            # packages/angulux/package.json and then into dist. Rebuilding here is what makes
            # the artifact carry the released version.
            - name: Rebuild at the released version
              if: steps.after.outputs.released == 'true'
              run: corepack pnpm --filter angulux run build

            # The gate that would have caught the bug this whole arrangement exists to avoid.
            #
            # updatePackageJson() in tools/build/build-helper.mjs assigns the ROOT version onto
            # the package manifest on every build. When semantic-release wrote to the package
            # manifest instead of the root, the rebuild silently reverted the bump, dist kept
            # the previous version, `npm view` found it already published, and the job exited 0
            # — a tagged release with nothing on the registry, and a green pipeline.
            #
            # Publishing is irreversible, so this asserts rather than warns.
            - name: The artifact carries the released version
              if: steps.after.outputs.released == 'true'
              run: |
                  set -euo pipefail
                  expected="${{ steps.after.outputs.version }}"
                  actual=$(node -p "require('./packages/angulux/dist/package.json').version")

                  if [ "$actual" != "$expected" ]; then
                      echo "::error::dist/package.json says $actual but $expected was released."
                      echo "The build overwrote the version. Check updatePackageJson() in"
                      echo "tools/build/build-helper.mjs and which package.json semantic-release targets."
                      exit 1
                  fi
                  echo "dist carries $actual, as released"

            - name: Publish to npm
              if: steps.after.outputs.released == 'true'
              run: |
                  set -euo pipefail
                  version="${{ steps.after.outputs.version }}"

                  # A version that already exists on the registry after semantic-release just
                  # minted it is not a no-op to skip past — it means the computed version was
                  # wrong, or a previous run published and failed to tag. Either way, stop.
                  if npm view "angulux@$version" version >/dev/null 2>&1; then
                      echo "::error::angulux@$version is already on the registry, but this run just released it."
                      echo "Do not re-publish over it. Investigate the tags before doing anything else."
                      exit 1
                  fi

                  # Packed first, then published, so the artifact that ships is the same one
                  # check:publishable inspected — not a second build of it. See the fork job
                  # for why packing with pnpm rather than npm is load-bearing.
                  staging=$(mktemp -d)
                  (cd packages/angulux/dist && corepack pnpm pack --pack-destination "$staging" >/dev/null)
                  tarball="$staging/angulux-$version.tgz"
                  [ -f "$tarball" ] || { echo "::error::expected $tarball"; ls -la "$staging"; exit 1; }

                  npm publish --provenance --access public "$tarball"
