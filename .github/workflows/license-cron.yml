# Scheduled license-boundary check.
#
# WHY A CRON, when check:license already runs on every pull request:
#
# The pull-request run proves the tree was clean *at our last commit*. The boundary this
# gate enforces lives outside the repository — PrimeTek decides which of their releases is
# the last MIT one, and that decision can move after our last commit. A repository with no
# merges for three weeks is exactly the one that would not notice.
#
# It also catches a lockfile whose transitive resolution drifted, and a `latest` tag that
# moved underneath us.
#
# When this fails: do NOT relax the check. Read
# tools/check-prime-license.mjs (the FIRST_COMMERCIAL constant is the boundary record),
# confirm what actually changed upstream, and update the boundary deliberately, in its own
# commit, with the evidence. This gate going red is information, not an obstacle.

name: License boundary

on:
    schedule:
        # 06:00 UTC daily. Cheap, and the whole product claim rests on it.
        - cron: '0 6 * * *'
    workflow_dispatch:

permissions:
    contents: read
    issues: write

jobs:
    license:
        name: PrimeTek MIT boundary
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-node@v4
              with:
                  node-version: '22'

            - name: Enable corepack
              run: corepack enable

            - name: Install
              run: corepack pnpm install --frozen-lockfile

            - name: check:license
              id: license
              run: npm run check:license

            # catalog drift and the license boundary are the same failure wearing two
            # hats: a version that moved without a decision.
            - name: check:catalog
              if: always()
              run: npm run check:catalog

            - name: Verify archived MIT artifacts against the manifest
              if: always()
              run: |
                  if [ -d provenance/tarballs ]; then
                      node tools/provenance/archive-mit.mjs --verify
                  else
                      echo "provenance/tarballs/ is not present in CI (it is deliberately not published)."
                      echo "Checksums live in provenance/manifest.json; verification runs where the"
                      echo "evidence store is available. Skipping."
                  fi

            - name: Open an issue if the boundary moved
              if: failure()
              uses: actions/github-script@v7
              with:
                  script: |
                      const title = 'License boundary check failed on the scheduled run';
                      const existing = await github.rest.issues.listForRepo({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          state: 'open',
                          labels: 'licensing'
                      });
                      if (existing.data.some(i => i.title === title)) {
                          core.info('an open issue already tracks this');
                          return;
                      }
                      await github.rest.issues.create({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          title,
                          labels: ['licensing', 'P0'],
                          body: [
                              'The scheduled license-boundary check failed.',
                              '',
                              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                              '',
                              'This gate protects the claim the whole project rests on, so treat it as P0.',
                              '',
                              '**Do not relax the check to make this green.** Instead:',
                              '',
                              '1. Read `tools/check-prime-license.mjs` — the `FIRST_COMMERCIAL` constant records the boundary.',
                              '2. Confirm what actually changed upstream (a new PrimeTek major? a moved `latest` tag? drifted transitive resolution?).',
                              '3. Update the boundary deliberately, in its own commit, with the evidence in the message.',
                              '',
                              'See SECURITY.md — licensing contamination is handled as a supply-chain issue here.'
                          ].join('\n')
                      });
