# Conventional Commits, enforced where it actually matters.
#
# Releases and changelogs are generated by semantic-release from commit messages, so the
# format is load-bearing rather than cosmetic: a mistyped type silently produces no release,
# and a missed `!` silently produces the wrong one.
#
# The PR TITLE is checked (not each commit) because this project squash-merges — the title
# becomes the commit message on main, so it is the string semantic-release will read.
# Individual commit messages inside a branch are the contributor's business; their
# sign-off is checked separately, in ci.yml.

name: PR title

on:
    pull_request_target:
        types: [opened, edited, reopened, synchronize]

permissions:
    pull-requests: read

concurrency:
    group: pr-title-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    conventional:
        name: Conventional Commits
        runs-on: ubuntu-latest
        steps:
            - uses: amannn/action-semantic-pull-request@v5
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  types: |
                      feat
                      fix
                      perf
                      refactor
                      docs
                      test
                      build
                      ci
                      chore
                      revert
                  # Scopes are free-form on purpose: they are mostly module names, and a
                  # fixed list would need editing every time an attic module is promoted.
                  requireScope: false
                  subjectPattern: ^(?![A-Z])(?!.*\.$).{6,}$
                  subjectPatternError: |
                      The subject "{subject}" of "{title}" is not valid.

                      Start lowercase, no trailing period, at least 6 characters.
                      Write it as the completion of "this change will ...":

                          feat(table): add virtual scroll to the frozen column layout
                          fix(datepicker): stop the overlay closing on a same-day reselect
                          feat(attic): promote tree out of the attic

                      A breaking change is marked with `!` after the scope — but read the
                      API freeze in GOVERNANCE.md first: 22.x is frozen, and API redesign
                      is queued for the Angular 23 release.
                  # This repository squash-merges, so a single-commit PR does not get a
                  # separate pass — the title is the message either way.
                  validateSingleCommit: false
